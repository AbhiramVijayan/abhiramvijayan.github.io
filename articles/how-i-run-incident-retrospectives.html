      <h1>How I Run Incident Retrospectives Without Blame</h1>
      <p><em>Published: April 20, 2026</em></p>
      <p>Good retrospectives answer one question clearly: what system changes would make this class of incident less likely or less harmful next time?</p>

      <h2>1. Start With Facts, Not Opinions</h2>
      <p>I begin with a timeline: detection, escalation, mitigation, and recovery. The timeline is technical and objective before interpretation starts.</p>

      <h2>2. Separate Human Actions From System Conditions</h2>
      <p>People operate under constraints. We look at missing guardrails, weak observability, and unclear runbooks before discussing individual decisions.</p>

      <h2>3. Convert Findings Into Trackable Reliability Work</h2>
      <p>Every action item gets an owner, due date, and expected reliability impact. If a finding cannot produce a concrete action, it is not complete.</p>

      <h2>4. Share Learnings Across Teams</h2>
      <p>Incidents are expensive lessons. Summaries should be searchable and reusable so other teams can prevent similar failures.</p>
